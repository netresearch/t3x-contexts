name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
  schedule:
    - cron: '0 7 * * 1'

permissions: {}

jobs:
  security:
    uses: netresearch/typo3-ci-workflows/.github/workflows/security.yml@main
    permissions:
      contents: read
      security-events: write
    secrets:

  gitleaks:
    permissions:
      contents: read
      security-events: write
    uses: netresearch/.github/.github/workflows/gitleaks.yml@main
    secrets:
